<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동 작업 그림일기</title>
    <style>
        :root {
            --grid-color: #ff7e7e;
            --paper-bg: #fffcf0;
            --sidebar-bg: #f8f9fa;
        }
        body {
            display: flex;
            margin: 0;
            height: 100vh;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #e0e0e0;
        }

        /* Sidebar & Calendar */
        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #ccc;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .calendar-day-head { font-size: 12px; color: #666; padding-bottom: 5px; }
        .day {
            padding: 8px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        .day:hover { background-color: #e9ecef; }
        .day.today { background-color: #007bff; color: white; font-weight: bold; }
        .day.selected { border: 2px solid #007bff; }
        .day.future { color: #ccc; cursor: default; }
        .day.future:hover { background-color: transparent; }

        /* Main Content */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px;
        }
        #diary-wrapper {
            background-color: var(--paper-bg);
            padding: 40px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            border: 1px solid #ccc;
            max-width: 500px;
            position: relative;
        }
        .readonly-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: none; /* Only show on past dates */
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .canvas-container {
            border: 2px solid #555;
            background-color: white;
            margin-bottom: 30px;
            position: relative;
        }
        #drawing-canvas { display: block; }
        .text-grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(5, 40px);
            gap: 0;
            border: 1px solid var(--grid-color);
            margin: 0 auto;
        }
        .cell {
            width: 40px; height: 40px;
            border: 1px solid var(--grid-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: 500; color: #333;
            box-sizing: border-box;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        .btn-save { background-color: #28a745; color: white; }
        .btn-clear { background-color: #ff4757; color: white; }
        #date-label { font-weight: bold; color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>📅 일기 달력</h3>
        <div id="calendar">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="month-display"></span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <br>
            <div class="calendar-grid" id="calendar-days">
                <!-- Calendar content generated by JS -->
            </div>
        </div>
        <hr>
        <div id="info">
            <p>🔵 오늘: 작성 가능</p>
            <p>⚪ 과거: 읽기 전용</p>
            <p>🔘 미래: 접근 불가</p>
        </div>
    </div>

    <div id="main-content">
        <div id="date-label">날짜를 로딩 중...</div>
        <div id="diary-wrapper">
            <div class="readonly-overlay" id="overlay"></div>
            <h1 id="diary-title">그림 일기</h1>
            <div class="canvas-container">
                <canvas id="drawing-canvas" width="400" height="300"></canvas>
            </div>
            <div class="text-grid" id="text-grid"></div>
        </div>

        <div class="controls" id="edit-controls">
            <input type="text" id="diary-input" maxlength="50" style="padding:10px;" placeholder="일기를 입력하세요">
            <div style="display:flex; gap:10px;">
                <button id="save-btn" class="btn btn-save" style="flex:1">저장하기</button>
                <button id="clear-btn" class="btn btn-clear">지우기</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        const gridContainer = document.getElementById('text-grid');
        const input = document.getElementById('diary-input');
        const overlay = document.getElementById('overlay');
        const dateLabel = document.getElementById('date-label');
        const editControls = document.getElementById('edit-controls');
        
        let selectedDate = new Date(); // Default to today
        let currentMonth = new Date();
        const cells = [];

        // 1. Grid init
        for (let i = 0; i < 50; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            gridContainer.appendChild(cell);
            cells.push(cell);
        }

        // 2. Calendar Logic
        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            const monthDisplay = document.getElementById('month-display');
            daysContainer.innerHTML = '';
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            monthDisplay.textContent = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            today.setHours(0,0,0,0);

            // Weekday headers
            ['일','월','화','수','목','금','토'].forEach(d => {
                const el = document.createElement('div');
                el.className = 'calendar-day-head';
                el.textContent = d;
                daysContainer.appendChild(el);
            });

            // Empty cells for first week
            for (let i = 0; i < firstDay; i++) daysContainer.appendChild(document.createElement('div'));

            // Days
            for (let i = 1; i <= lastDate; i++) {
                const dateObj = new Date(year, month, i);
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.textContent = i;

                const isFuture = dateObj > today;
                const isToday = dateObj.getTime() === today.getTime();

                if (isFuture) dayEl.classList.add('future');
                if (isToday) dayEl.classList.add('today');
                if (dateObj.getTime() === selectedDate.setHours(0,0,0,0)) dayEl.classList.add('selected');

                dayEl.onclick = () => {
                    if (isFuture) {
                        alert("미래의 일기는 아직 열리지 않았습니다.");
                        return;
                    }
                    selectDate(dateObj);
                };
                daysContainer.appendChild(dayEl);
            }
        }

        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderCalendar();
        }

        // 3. Date Selection & Loading
        async function selectDate(date) {
            selectedDate = new Date(date);
            const dateStr = formatDate(selectedDate);
            dateLabel.textContent = `${dateStr}의 일기`;
            renderCalendar();

            const todayStr = formatDate(new Date());
            const isToday = (dateStr === todayStr);

            // Toggle Edit mode
            if (isToday) {
                overlay.style.display = 'none';
                editControls.style.display = 'flex';
                canvas.style.cursor = 'crosshair';
            } else {
                overlay.style.display = 'block';
                editControls.style.display = 'none';
                canvas.style.cursor = 'default';
            }

            // Load Data
            clearAll(false);
            
            // 1. Try to load from LocalStorage first (for today's unsaved/temp changes)
            const localData = localStorage.getItem(`diary_${dateStr}`);
            if (localData) {
                const parsed = JSON.parse(localData);
                loadToUI(parsed.imageData, parsed.textData);
                return;
            }

            // 2. Try to load from static resources folder (Cloudflare Pages will serve these)
            try {
                // 그림 파일 확인
                const imgUrl = `/resources/${dateStr}_그림.jpg`;
                const txtUrl = `/resources/${dateStr}_내용.txt`;

                const imgResp = await fetch(imgUrl);
                if (imgResp.ok) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = imgUrl;
                }

                const txtResp = await fetch(txtUrl);
                if (txtResp.ok) {
                    const text = await txtResp.text();
                    syncText(text);
                    input.value = text;
                }
            } catch (e) {
                console.log("No saved data found for this date.");
            }
        }

        function loadToUI(imgData, txtData) {
            if (imgData) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = imgData;
            }
            if (txtData) {
                syncText(txtData);
                input.value = txtData;
            }
        }

        function formatDate(d) {
            const offset = d.getTimezoneOffset() * 60000;
            const dateLocal = new Date(d.getTime() - offset);
            return dateLocal.toISOString().split('T')[0];
        }

        // ... (Drawing and Typing logic remains same) ...

        // 6. Save & Clear
        document.getElementById('save-btn').onclick = async () => {
            const dateStr = formatDate(selectedDate);
            const imageData = canvas.toDataURL('image/jpeg');
            const textData = input.value;

            // Cloudflare Pages(Static)에서는 서버 파일 쓰기가 불가능하므로 LocalStorage에 저장
            localStorage.setItem(`diary_${dateStr}`, JSON.stringify({ imageData, textData }));
            
            alert('일기가 브라우저에 저장되었습니다!\n(서버 저장을 위해서는 Cloudflare Workers 설정이 필요합니다)');
        };

        document.getElementById('clear-btn').onclick = () => {
            if (confirm('모두 지우시겠습니까?')) clearAll(true);
        };

        function clearAll(clearInput) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            syncText("");
            if (clearInput) input.value = "";
        }

        // Init
        renderCalendar();
        selectDate(new Date());

    </script>
</body>
</html>

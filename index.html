<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 그림일기 - Shared Picture Diary</title>
    <link rel="stylesheet" href="style.css">
    <!-- 구글 폰트 및 애니메이션 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @keyframes typeEffect {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="calendar-header">
            <button class="tool-btn" onclick="changeMonth(-1)">◀</button>
            <div id="calendar-selectors">
                <select id="year-select" onchange="jumpToDate()"></select>
                <select id="month-select" onchange="jumpToDate()"></select>
            </div>
            <button class="tool-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
        <div style="margin-top: auto; font-size: 12px; color: #aaa; text-align: center;">
            오늘의 추억을 기록해보세요
        </div>
    </div>

    <div id="main-content">
        <div id="diary-page">
            <div class="overlay" id="overlay"></div>
            
            <div class="diary-header">
                <div class="diary-date" id="date-label"></div>
                <div class="weather-selector">
                    날씨: 
                    <select id="weather-select" onchange="autoSave()">
                        <option value="sunny">☀️ 맑음</option>
                        <option value="cloudy">⛅ 보통</option>
                        <option value="rainy">☁️ 흐림</option>
                        <option value="snow">❄️ 눈</option>
                    </select>
                </div>
            </div>

            <div class="canvas-section">
                <div class="drawing-container">
                    <canvas id="drawing-canvas" width="450" height="320"></canvas>
                </div>
                
                <div class="toolbar">
                    <div class="tool-btn active" onclick="selectColor('#000000', this)">
                        <div class="color-dot" style="background-color: #000;"></div>
                    </div>
                    <div class="tool-btn" onclick="selectColor('#ff4757', this)">
                        <div class="color-dot" style="background-color: #ff4757;"></div>
                    </div>
                    <div class="tool-btn" onclick="selectColor('#2ed573', this)">
                        <div class="color-dot" style="background-color: #2ed573;"></div>
                    </div>
                    <div class="tool-btn" onclick="selectColor('#1e90ff', this)">
                        <div class="color-dot" style="background-color: #1e90ff;"></div>
                    </div>
                    <div class="tool-btn" onclick="selectColor('#ffa502', this)">
                        <div class="color-dot" style="background-color: #ffa502;"></div>
                    </div>
                    <div class="tool-btn" onclick="selectEraser(this)" title="지우개 (흰색 펜)">
                        <div class="color-dot" style="background-color: #ffffff; border: 1px solid #ddd;"></div>
                    </div>
                </div>
            </div>

            <div class="text-grid" id="text-grid"></div>

            <div class="input-section" id="input-section">
                <input type="text" id="diary-input" maxlength="50" placeholder="여기에 오늘의 일기를 쓰세요 (자동 저장됩니다)">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
